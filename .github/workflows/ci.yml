name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - name: Verify standalone installer
        shell: bash
        run: |
          sh -n fleet.sh
          cargo build --release
          temporary_home="$(mktemp -d)"
          mkdir -p "$temporary_home/bin"
          export PATH="$temporary_home/bin:$PATH"
          HOME="$temporary_home" \
            SHELL=/bin/bash \
            FLEET_BINARY="$PWD/target/release/fleet" \
            bash ./fleet.sh
          test "$(command -v fleet)" = "$temporary_home/bin/fleet"
          fleet --version
          rm -rf "$temporary_home"
