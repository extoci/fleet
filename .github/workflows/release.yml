name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches Cargo.toml
        shell: bash
        run: |
          package_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "${GITHUB_REF_NAME#v}" = "$package_version" || {
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $package_version" >&2
            exit 1
          }
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Smoke-test release binary
        run: target/${{ matrix.target }}/release/fleet --version
      - name: Package
        shell: bash
        run: |
          asset="fleet-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" fleet
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" >"$asset.sha256"
          else
            shasum -a 256 "$asset" >"$asset.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: fleet-${{ matrix.target }}
          path: |
            fleet-${{ matrix.target }}.tar.gz
            fleet-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: fleet-*
          path: dist
          merge-multiple: true
      - name: Add installer to release assets
        run: cp fleet.sh dist/fleet.sh
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
